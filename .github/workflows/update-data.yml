name: Update fitness data

on:
  workflow_dispatch:
  schedule:
    # Runs every 6 hours in UTC.
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: update-fitness-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Strava secrets
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          TOKEN_STATE_PASSPHRASE: ${{ secrets.TOKEN_STATE_PASSPHRASE }}
        run: |
          test -n "$STRAVA_CLIENT_ID" || { echo "Missing STRAVA_CLIENT_ID"; exit 1; }
          test -n "$STRAVA_CLIENT_SECRET" || { echo "Missing STRAVA_CLIENT_SECRET"; exit 1; }
          test -n "$STRAVA_REFRESH_TOKEN" || { echo "Missing STRAVA_REFRESH_TOKEN"; exit 1; }
          test -n "$TOKEN_STATE_PASSPHRASE" || { echo "Missing TOKEN_STATE_PASSPHRASE"; exit 1; }

      - name: Restore encrypted Strava token state
        env:
          TOKEN_STATE_PASSPHRASE: ${{ secrets.TOKEN_STATE_PASSPHRASE }}
        run: |
          mkdir -p raw_data
          if [ -f .state/strava_token.json.enc ] && [ -n "$TOKEN_STATE_PASSPHRASE" ]; then
            openssl enc -aes-256-cbc -d -salt -pbkdf2 \
              -in .state/strava_token.json.enc \
              -out raw_data/strava_token.json \
              -pass env:TOKEN_STATE_PASSPHRASE
          fi

      - name: Fetch Strava activities
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          STRAVA_TOKEN_FILE: raw_data/strava_token.json
          STRAVA_MAX_PAGES: "5"
        run: python scripts/fetch_strava.py

      - name: Build public JSON
        run: python scripts/build_public_data.py

      - name: Validate public JSON
        run: python scripts/validate_public_data.py

      - name: Save encrypted Strava token state
        env:
          TOKEN_STATE_PASSPHRASE: ${{ secrets.TOKEN_STATE_PASSPHRASE }}
        run: |
          if [ -n "$TOKEN_STATE_PASSPHRASE" ]; then
            mkdir -p .state
            openssl enc -aes-256-cbc -salt -pbkdf2 \
              -in raw_data/strava_token.json \
              -out .state/strava_token.json.enc \
              -pass env:TOKEN_STATE_PASSPHRASE
          fi

      - name: Rebase generated data on latest main
        run: |
          git fetch origin main
          if ! git diff --quiet -- public/data .state/strava_token.json.enc || [ -n "$(git ls-files --others --exclude-standard public/data .state/strava_token.json.enc)" ]; then
            git stash push --include-untracked -- public/data .state/strava_token.json.enc
            STASHED=true
          else
            STASHED=false
          fi
          git rebase origin/main
          if [ "$STASHED" = "true" ]; then
            git stash pop
          fi

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data .state/strava_token.json.enc
          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
            exit 0
          fi
          git commit -m "Update fitness data"
          git push origin HEAD:main
